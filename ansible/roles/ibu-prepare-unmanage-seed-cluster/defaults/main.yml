---
# ibu-prepare-seed-cluster-unmanage default vars

# Leave empty unless you selected a cluster and removed it from gitops
seed_cluster: ""

# The kubeconfig to the cluster being generated into a ibu seed image
seedcluster_kubeconfig: "{{ install_directory }}/rhacm-ztp/ibu/seed/{{ seed_cluster }}.kubeconfig"

# Repository type: "cnf-features-deploy" (pre-4.21) or "telco-reference" (4.21+)
# This should match the ztp_repo_type set in rhacm-ztp-setup role
ztp_repo_type: "cnf-features-deploy"

# Derived paths based on repo type (must match rhacm-ztp-setup)
ztp_repo_name: "{{ 'telco-reference' if ztp_repo_type == 'telco-reference' else 'cnf-features-deploy' }}"
ztp_argocd_base_path: "{{ 'telco-ran/configuration/argocd' if ztp_repo_type == 'telco-reference' else 'ztp/gitops-subscriptions/argocd' }}"
